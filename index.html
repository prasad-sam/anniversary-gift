<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary ❤️</title>

    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 80%;
            max-width: 800px;
            margin: 40px auto;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 35px;
            margin-top: 0;
            color: #fff5f7;
        }

        p {
            font-size: 24px;
            line-height: 1.6;
        }

        .heart {
            font-size: 60px;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .slideshow-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 30px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.4);
        }

        .slide {
            display: none;
        }

        .slide img {
            width: 100%;
            height: 450px;
            object-fit: cover;
        }

        .fade {
            animation: fade 1.5s;
        }

        @keyframes fade {
            from {
                opacity: .4
            }

            to {
                opacity: 1
            }
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #ff4b5c;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #ffe6ea;
        }

        .floating-heart {
            position: fixed;
            bottom: -20px;
            color: white;
            animation: floatUp 6s linear infinite;
            font-size: 25px;
            opacity: 0.8;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }

        .love-message {
            margin-top: 20px;
            font-size: 26px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 35px;
            }

            h2 {
                font-size: 25px;
            }

            p {
                font-size: 18px;
            }

            .slide img {
                height: 300px;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="heart">❤️</div>

        <h1>Happy wedding Anniversary My Love</h1>

        <h2>Haveela ❤️</h2>

        <div class="slideshow-container">
            <div class="slide fade">
                <img src="images/DSC08104.JPG"
                    alt="Love Image">
            </div>
            <div class="slide fade">

                    alt="Love Image">

                    alt="Love Image">

            <div class="slide fade">
                <img src="images/IMG-7067.JPG"
                    alt="Love Image">

            <div class="slide fade">
                <img src="images/IMG-20260405-WA0034.jpg"
                    alt="Couple Image">
            </div>
            <div class="slide fade">
                <img src="images/IMG-7136.JPG"
                    alt="Love Image">
            </div>

            <div class="slide fade">
                <img src="images/IMG-20260405-WA0003.jpg"
                    alt="Anniversary Image">
            </div>

        </div>

        <p>
            Every moment with you is special ❤️<br>
            Thank you for filling my life with love, happiness, and endless memories.
        </p>

        <div class="love-message">
            You are my today, tomorrow, and forever 💕
        </div>

        <button onclick="showMessage()">Click Me 💝</button>

    </div>

    <audio autoplay loop>
        <source src="images/music-263144.mp3" type="audio/mp3">
    </audio>

    <script>

        function showMessage() {
            alert("Haveela ❤️\n\nThis is my aniversary gift 💕");
        }

        let slideIndex = 0;
        showSlides();

        function showSlides() {

            let slides = document.getElementsByClassName("slide");

            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            slideIndex++;

            if (slideIndex > slides.length) {
                slideIndex = 1;
            }

            slides[slideIndex - 1].style.display = "block";

            setTimeout(showSlides, 3000);
        }

        function createHeart() {

            const heart = document.createElement("div");

            heart.classList.add("floating-heart");

            heart.innerHTML = "❤️";

            heart.style.left = Math.random() * 100 + "vw";

            heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 300);

    </script>

</body>

</html>
